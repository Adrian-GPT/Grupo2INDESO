<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestAI | Clasificador SVC</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { deep: '#0A1428', base: '#0D1B33', card: '#122548', border: '#1F3864' },
          teal: '#26A69A', mint: '#4ADE80', gold: '#C5961A', sky: '#3B82F6', coral: '#EF5350',
          ink: { 100: '#E2E8F3', 300: '#9FB0CE', 500: '#6B7A99' }
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  };
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  a:focus-visible, button:focus-visible, select:focus-visible { outline: 2px solid #4ADE80; outline-offset: 3px; border-radius: 0.5rem; }
  ::selection { background: #26A69A; color: #0A1428; }
</style>
</head>

<body class="bg-navy-base text-ink-100 font-sans antialiased">

  <!-- ============ HEADER ============ -->
  <header class="border-b border-navy-border/60 bg-navy-deep/40">
    <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-mint/15 text-mint flex items-center justify-center shrink-0">
          <i data-lucide="shield-check" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight text-white">Ernesto Investing AI</h1>
          <p class="text-sm text-ink-300">Clasificador SVC — Datos reales vía API</p>
        </div>
      </div>
      <nav class="flex flex-wrap gap-2">
        <a href="index.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-navy-border text-ink-300 text-sm hover:border-teal/60 hover:text-teal transition-colors">
          <i data-lucide="home" class="w-4 h-4"></i> Portal
        </a>
        <a href="modulo_mercado.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-navy-border text-ink-300 text-sm hover:border-teal/60 hover:text-teal transition-colors">
          <i data-lucide="candlestick-chart" class="w-4 h-4"></i> Dashboard de Mercado
        </a>
      </nav>
    </div>
  </header>

  <!-- ============ CONTROLES ============ -->
  <section class="border-b border-navy-border/60 bg-navy-card/30">
    <div class="max-w-6xl mx-auto px-6 py-5 flex flex-wrap items-end gap-4">
      <div class="flex flex-col gap-1.5">
        <label for="selTicker" class="text-xs font-semibold uppercase tracking-wide text-ink-300">Ticker</label>
        <select id="selTicker" onchange="cargarSVC()"
          class="px-4 py-2.5 rounded-xl bg-navy-deep border border-navy-border text-ink-100 text-sm focus:border-mint outline-none">
          <option value="FSM">FSM</option>
          <option value="VOLCABC1.LM">VOLCABC1.LM</option>
          <option value="ABX.TO">ABX.TO</option>
          <option value="BVN" selected>BVN</option>
          <option value="BHP">BHP</option>
        </select>
      </div>
    </div>
  </section>

  <!-- ============ CONTENIDO ============ -->
  <main class="max-w-6xl mx-auto px-6 py-8">
    <div id="aviso" class="mb-6"></div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <!-- Señal actual -->
      <div class="rounded-2xl border border-navy-border/70 bg-navy-card/60 p-6">
        <div class="flex items-center gap-2 mb-4">
          <i data-lucide="gauge" class="w-4 h-4 text-mint"></i>
          <span class="text-xs font-semibold uppercase tracking-wide text-ink-300">Señal Actual del SVC (Modelo Real)</span>
        </div>
        <div id="semaforo" class="flex flex-col items-center gap-3 py-6"></div>
      </div>

      <!-- Métricas -->
      <div class="rounded-2xl border border-navy-border/70 bg-navy-card/60 p-6">
        <div class="flex items-center gap-2 mb-4">
          <i data-lucide="bar-chart-3" class="w-4 h-4 text-mint"></i>
          <span class="text-xs font-semibold uppercase tracking-wide text-ink-300">Métricas de Desempeño</span>
        </div>
        <div id="metricas" class="grid grid-cols-2 gap-3"></div>
      </div>
    </div>

    <!-- Matriz de confusión -->
    <div class="rounded-2xl border border-navy-border/70 bg-navy-card/60 p-6">
      <div class="flex items-center gap-2 mb-4">
        <i data-lucide="grid-3x3" class="w-4 h-4 text-mint"></i>
        <span class="text-xs font-semibold uppercase tracking-wide text-ink-300">Matriz de Confusión</span>
      </div>
      <canvas id="grafico" height="80"></canvas>
    </div>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="border-t border-navy-border/60 bg-navy-deep/40 mt-8">
    <div class="max-w-6xl mx-auto px-6 py-8 text-sm text-ink-500 text-center">
      Ernesto Investing AI — iDeSo · UNMSM · Prof. E. D. Cancho-Rodríguez, MBA (GWU)
    </div>
  </footer>

<script>
lucide.createIcons();
let chart = null;

function getApiUrl(){ return sessionStorage.getItem('API_URL'); }

function mostrarAviso(tipo, html){
  const aviso = document.getElementById('aviso');
  const estilos = {
    info:  'bg-navy-card/60 text-ink-300 border-navy-border',
    error: 'bg-coral/10 text-coral border-coral/30'
  };
  const icono = tipo === 'error' ? 'x-circle' : 'loader';
  aviso.innerHTML = '<div class="inline-flex items-start gap-2 px-4 py-3 rounded-xl border text-sm ' + estilos[tipo] + '">'
    + '<i data-lucide="' + icono + '" class="w-4 h-4 mt-0.5 shrink-0 ' + (tipo==='info' ? 'animate-spin' : '') + '"></i>'
    + '<span>' + html + '</span></div>';
  lucide.createIcons();
}

async function cargarSVC(){
  const apiUrl = getApiUrl();
  const ticker = document.getElementById('selTicker').value;
  if(!apiUrl){
    mostrarAviso('error', 'No hay URL de API. Vuelve al <a href="index.html" class="underline">portal</a> y verifica la conexión.');
    return;
  }
  mostrarAviso('info', 'Cargando SVC de ' + ticker + '...');
  try{
    const r = await fetch(apiUrl + '/api/svc/' + ticker, { headers: { 'ngrok-skip-browser-warning': 'true' } });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    renderizar(data);
    document.getElementById('aviso').innerHTML = '';
  }catch(e){
    mostrarAviso('error', 'Error: ' + e.message);
  }
}

function renderizar(data){
  const p = data.prediccion, m = data.metricas || {};
  const esBuy = p.senal === 'BUY';

  document.getElementById('semaforo').innerHTML =
    '<div class="w-28 h-28 rounded-full flex items-center justify-center font-extrabold text-lg text-white '
      + (esBuy ? 'bg-mint shadow-lg shadow-mint/30' : 'bg-coral shadow-lg shadow-coral/30') + '">'
      + (esBuy ? '▲ BUY' : '▼ SELL') + '</div>'
    + '<div class="text-3xl font-extrabold text-white">' + (p.confianza * 100).toFixed(0) + '%</div>'
    + '<div class="text-xs text-ink-300">Confianza del modelo</div>';

  document.getElementById('metricas').innerHTML = [
    { l:'Accuracy',  v:((m.accuracy  || 0) * 100).toFixed(1) + '%' },
    { l:'Precision', v:((m.precision || 0) * 100).toFixed(1) + '%' },
    { l:'Recall',    v:((m.recall    || 0) * 100).toFixed(1) + '%' },
    { l:'F1-Score',  v:((m.f1        || 0) * 100).toFixed(1) + '%' }
  ].map(x =>
    '<div class="text-center px-3 py-4 rounded-xl bg-navy-deep border border-navy-border">'
      + '<div class="text-xl font-extrabold text-white">' + x.v + '</div>'
      + '<div class="text-[0.68rem] uppercase tracking-wide text-ink-300 mt-1">' + x.l + '</div></div>'
  ).join('');

  const cm = m.matriz_confusion || [[0,0],[0,0]];
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('grafico'), {
    type:'bar',
    data:{
      labels:['Verd. Neg','Falso Pos','Falso Neg','Verd. Pos'],
      datasets:[{
        label:'Casos',
        data:[cm[0][0], cm[0][1], cm[1][0], cm[1][1]],
        backgroundColor:['#4ADE80','#EF5350','#EF5350','#4ADE80']
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ color:'#9FB0CE' }, grid:{ color:'#1F3864' } },
        y:{ beginAtZero:true, title:{ display:true, text:'Casos', color:'#9FB0CE' }, ticks:{ color:'#9FB0CE' }, grid:{ color:'#1F3864' } }
      }
    }
  });
}

window.addEventListener('DOMContentLoaded', cargarSVC);
</script>
</body>
</html>
